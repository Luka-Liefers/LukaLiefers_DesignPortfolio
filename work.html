<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luka Liefers | Visual Works</title>
  <meta name="description" content="A curated collection of creative projects by Luka Liefers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="projects-page">
    <div class="left-section">
      <div class="title-area">
        <a href="index.html" class="back-link">← Back</a>
        <h1 class="font-akony">VISUAL<br />WORKS</h1>
        <p class="subtitle">A curated collection of creative projects exploring visual storytelling, digital art, and artistic expression.</p>
      </div>
      <div class="image-area">
        <img src="assets/img/illustration.png" alt="Illustration" class="project-image" id="preview-image" />
      </div>
    </div>

    <div class="right-section">
      <div class="project-list">

        <button class="project-bar expanded" type="button" data-project="illustration" data-image="assets/img/illustration.png">
          <div class="project-bar-header">
            <span class="project-number">01</span>
            <span class="project-title font-akony">ILLUSTRATION</span>
            <span class="project-year">2024</span>
            <span class="project-tags">Illustration / Digital Art</span>
          </div>
          <div class="project-details-wrapper open">
            <div class="project-details">
              <div class="project-text">
                <p class="project-subtitle">A collection of custom playing cards</p>
                <p class="project-description">This project is a custom collection of playing cards, each digitally illustrated by hand to create a fully tailored deck. Every card was designed with consistency, detail, and character in mind, blending traditional playing card structure with a unique visual style. The result is a cohesive, original deck that showcases both illustration skill and thoughtful design.</p>
                <div class="project-tags-expanded">
                  <span class="tag">Illustration</span><span class="tag">Digital Art</span>
                </div>
              </div>
              <div class="project-carousel"></div>
            </div>
          </div>
        </button>

        <button class="project-bar" type="button" data-project="photography" data-image="assets/img/photography.jpg">
          <div class="project-bar-header">
            <span class="project-number">02</span>
            <span class="project-title font-akony">PHOTOGRAPHY</span>
            <span class="project-year">2024</span>
            <span class="project-tags">Photography / Exposition</span>
          </div>
          <div class="project-details-wrapper">
            <div class="project-details">
              <div class="project-text">
                <p class="project-subtitle">Product and Promotional Photography</p>
                <p class="project-description">This project captures a promotional photography shoot for Heutink Ikonen during the PAN Amsterdam Art Expo. The focus was on highlighting the gallery's presence, artworks, and atmosphere within the dynamic setting of the fair. Through careful composition and lighting, the images were created to reflect both the refinement of the artworks and the energy of the exhibition environment.</p>
                <div class="project-tags-expanded">
                  <span class="tag">Photography</span><span class="tag">Exposition</span>
                </div>
              </div>
              <div class="project-carousel"></div>
            </div>
          </div>
        </button>

        <button class="project-bar" type="button" data-project="3d-modeling" data-image="assets/img/modeling.png">
          <div class="project-bar-header">
            <span class="project-number">03</span>
            <span class="project-title font-akony">3D MODELING</span>
            <span class="project-year">2024</span>
            <span class="project-tags">3D Modeling / Character Art</span>
          </div>
          <div class="project-details-wrapper">
            <div class="project-details">
              <div class="project-text">
                <p class="project-subtitle">A fully modeled and textured 3D character</p>
                <p class="project-description">This project is a fully realized 3D character, modeled, textured, and rendered entirely from scratch. Careful attention was paid to topology, proportion, and surface detail to bring the design convincingly to life. From the initial blockout through to final lighting, each stage was crafted to produce a polished, presentation-ready model with a clear sense of personality and form.</p>
                <div class="project-tags-expanded">
                  <span class="tag">3D Modeling</span><span class="tag">Texturing</span><span class="tag">Rendering</span>
                </div>
              </div>
              <div class="project-carousel"></div>
            </div>
          </div>
        </button>

        <button class="project-bar" type="button" data-project="branding" data-image="assets/img/branding.png">
          <div class="project-bar-header">
            <span class="project-number">04</span>
            <span class="project-title font-akony">BRANDING</span>
            <span class="project-year">2024</span>
            <span class="project-tags">Branding / Identity Design</span>
          </div>
          <div class="project-details-wrapper">
            <div class="project-details">
              <div class="project-text">
                <p class="project-subtitle">A cohesive brand identity for a creative workshop</p>
                <p class="project-description">This project develops a complete visual identity for a creative workshop, translating a single concept into a consistent system of logo, type, and color. The identity was applied across printed stationery, packaging, and promotional materials to create a recognizable, unified experience. Every touchpoint was carefully designed to feel considered, professional, and true to the brand's character.</p>
                <div class="project-tags-expanded">
                  <span class="tag">Branding</span><span class="tag">Visual Identity</span><span class="tag">Print Design</span>
                </div>
              </div>
              <div class="project-carousel"></div>
            </div>
          </div>
        </button>

      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
